name: Build Bearpaw

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64

    runs-on: ${{ matrix.os }}

    env:
      TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      WIN_CERTIFICATE_THUMBPRINT: ${{ secrets.WIN_CERTIFICATE_THUMBPRINT }}
      WIN_CERTIFICATE_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libudev-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Rust
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        working-directory: frontend
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Sign macOS app
        if: matrix.os == 'macos-latest' && env.APPLE_SIGNING_IDENTITY != ''
        run: |
          xcrun codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" \
            target/${{ matrix.target }}/release/bundle/macos/Bearpaw.app

      - name: Sign Windows installer
        if: matrix.os == 'windows-latest' && env.WIN_CERTIFICATE_THUMBPRINT != ''
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "target/${{ matrix.target }}/release/bundle/msi" -Filter *.msi | Select-Object -First 1
          if ($msi) {
            signtool sign /fd sha256 /tr http://timestamp.digicert.com /td sha256 /sha1 $env:WIN_CERTIFICATE_THUMBPRINT $msi.FullName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bearpaw-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/*.app
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 30
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      # Pre-release tags (v*-beta.*, v*-rc.*, v*-alpha.*) publish as GitHub
      # pre-releases so testers see them flagged and they don't displace a
      # stable "latest". A bare vX.Y.Z tag publishes as a normal release.
      - name: Flag pre-release tags
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value }}
          # These builds are UNSIGNED — prepend per-OS instructions for getting
          # past Gatekeeper/SmartScreen above the auto-generated changelog.
          body: |
            ## Installing this build

            Bearpaw is a control interface for the Uniden BC125AT scanner. These
            builds are **not yet code-signed**, so your OS will warn you the
            first time you open the app. That's expected — here's how to run it:

            **macOS** (`.dmg`): open the dmg and drag Bearpaw to Applications. On
            first launch, right-click the app → **Open** → **Open** (a plain
            double-click will say it "can't be opened"). If it still refuses,
            open Terminal and run:
            ```
            xattr -cr /Applications/Bearpaw.app
            ```

            **Windows** (`.msi` / `.exe`): if SmartScreen shows "Windows
            protected your PC", click **More info** → **Run anyway**.

            **Linux** (`.AppImage`): `chmod +x` it and run; or install the `.deb`.

            Plug in your BC125AT over USB and launch — the app auto-detects the
            scanner, so no config file is required to get started. (A
            `config.yaml` beside the app is only needed to override the port or
            tweak advanced settings.)

            Found a bug? Please open an issue with your OS and what you were doing.

            ---
